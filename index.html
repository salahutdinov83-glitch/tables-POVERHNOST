<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог продукции</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        
        /* Шапка */
        .header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        /* Контейнер для PDF */
        .pdf-container {
            width: 100%;
            height: calc(100vh - 80px);
            background: #525659;
        }
        
        /* Полноэкранный просмотр */
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Кнопка скачивания */
        .download-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .download-btn:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Каталог продукции 2025</h1>
    </div>
    
    <!-- Кнопка скачать -->
    <a href="catalog22_03_26.pdf" download class="download-btn">⬇ Скачать PDF</a>
    
    <!-- Встроенный просмотрщик PDF -->
    <div class="pdf-container">
        <iframe 
            src="catalog22_03_26.pdf#toolbar=1&navpanes=1" 
            class="pdf-viewer"
            type="application/pdf">
        </iframe>
    </div>
    
    <!-- Fallback для старых браузеров -->
    <noscript>
        <p style="text-align: center; padding: 50px;">
            Ваш браузер не поддерживает просмотр PDF. 
            <a href="catalog22_03_26.pdf">Скачайте файл</a>
        </p>
    </noscript>
</body>
</html>
